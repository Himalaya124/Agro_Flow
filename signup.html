<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agro Flow - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2><img src="logo.jpg" alt="Logo" class="logo"> AgroFlow</h2>
    <h3>Officer Registration</h3>
    <form action="#" method="post">
        <input type="text" name="name" placeholder="Officer ID" required>
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="nid" placeholder="NID Number" required>
        <input type="text" name="office_location" placeholder="Office Location" required>
        <input type="text" name="region_assigned" placeholder="Region Assigned" required>
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="text" name="contact" placeholder="E-mail">
        <input type="text" name="contact" placeholder="Password" required>
        <input type="text" name="contact" placeholder="Confirm Password" required>

        <div class="button-wrapper">
            <button type="submit">Sign Up</button>
        </div>

        <p class="switch">Already have an account? <a href="login.html">Login</a></p>
    </form>
</div>
</body>
</html>
