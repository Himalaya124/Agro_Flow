<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agro Flow - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2><img src="logo.jpg" alt="Logo" class="logo"> AgroFlow</h2>
    <h3>Officer Login</h3>
    <form action="#" method="post">
        <input type="text" id="name" placeholder="Officer ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>
        <div class="button-wrapper">
            <button type="submit">Login</button>
        </div>

        <p class="switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </form>
</div>
</body>
</html>
